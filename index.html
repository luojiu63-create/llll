<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>英语听力精听助手</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 500px; }
        .round-info { font-size: 24px; color: #2c3e50; margin-bottom: 10px; font-weight: bold; }
        .status-msg { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        audio { width: 100%; margin-bottom: 20px; }
        .mark-btn { background-color: #e74c3c; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; transition: transform 0.1s; width: 100%; }
        .mark-btn:active { transform: scale(0.95); }
        .controls { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        input[type="file"] { margin-bottom: 20px; }
        .mark-list { margin-top: 15px; font-size: 12px; color: #95a5a6; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="roundIndicator" class="round-info">第 1 遍</div>
    <div id="status" class="status-msg">上传音频后开始听力...</div>

    <input type="file" id="audioUpload" accept="audio/*">
    
    <audio id="audioPlayer" controls></audio>

    <button class="mark-btn" onclick="addMark()">没听清？点击标记 (Mark)</button>

    <div class="controls">
        <button onclick="resetRounds()">重置遍数</button>
        <div class="mark-list" id="markList">标记点：无</div>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const roundIndicator = document.getElementById('roundIndicator');
    const statusMsg = document.getElementById('status');
    const markListDiv = document.getElementById('markList');

    let marks = [];          // 存储标记的时间点（秒）
    let currentRound = 1;    // 当前遍数
    let lastTime = 0;        // 记录上一次的时间，用于检测是否往回拉了
    const SLOW_RANGE = 2;    // 标记点前后自动减速的范围（秒）

    // 1. 处理音频上传
    document.getElementById('audioUpload').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            audio.src = URL.createObjectURL(file);
            resetRounds();
            statusMsg.innerText = "音频已加载。第1遍请正常收听，标记模糊处。";
        }
    };

    // 2. 标记功能
    function addMark() {
        const currentTime = audio.currentTime;
        if (currentTime > 0) {
            marks.push(currentTime);
            updateMarkList();
            statusMsg.innerText = `已标记在 ${Math.round(currentTime)}秒 附近`;
        }
    }

    // 3. 遍数自动识别逻辑 (核心)
    audio.onseeking = function() {
        // 如果用户把进度条往回拉超过3秒，判定为进入下一遍
        if (audio.currentTime < lastTime - 1) {
            currentRound++;
            updateRoundUI();
        }
        lastTime = audio.currentTime;
    };

    // 4. 实时播放控制逻辑
    audio.ontimeupdate = function() {
        const now = audio.currentTime;

        // 仅在第2遍及以后才开启自动减速
        if (currentRound > 1) {
            let shouldSlowDown = false;
            
            // 检查当前时间是否在任何一个标记点的范围内
            for (let mark of marks) {
                if (now >= (mark - SLOW_RANGE) && now <= (mark + SLOW_RANGE)) {
                    shouldSlowDown = true;
                    break;
                }
            }

            if (shouldSlowDown) {
                if (audio.playbackRate !== 0.5) {
                    audio.playbackRate = 0.5;
                    statusMsg.innerText = "进入标记区域：慢速播放中...";
                    statusMsg.style.color = "#e67e22";
                }
            } else {
                if (audio.playbackRate !== 1.0) {
                    audio.playbackRate = 1.0;
                    statusMsg.innerText = "常速播放中";
                    statusMsg.style.color = "#7f8c8d";
                }
            }
        }
        
        // 更新 lastTime，但避开正在seeking的情况
        if (!audio.seeking) {
            lastTime = now;
        }
    };

    // UI 更新函数
    function updateRoundUI() {
        roundIndicator.innerText = `第 ${currentRound} 遍`;
        if (currentRound > 1) {
            statusMsg.innerText = "复习模式：标记点前后将自动减速";
        }
    }

    function resetRounds() {
        currentRound = 1;
        marks = [];
        updateRoundUI();
        updateMarkList();
        statusMsg.innerText = "已重置。开始第1遍记录。";
        audio.playbackRate = 1.0;
    }

    function updateMarkList() {
        if (marks.length === 0) {
            markListDiv.innerText = "标记点：无";
        } else {
            const list = marks.map(m => Math.round(m) + "s").join(", ");
            markListDiv.innerText = "标记点：" + list;
        }
    }
</script>

</body>
</html>
